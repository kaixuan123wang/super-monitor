events {
    worker_connections 1024;
}

http {
    upstream monitor_web {
        server monitor-web:80;
    }

    upstream monitor_api {
        server monitor-server:8080;
    }

    upstream monitor_sse {
        server monitor-server:8081;
    }

    # SDK 上报限流（按 IP，每秒 100 突发 200）
    limit_req_zone $binary_remote_addr zone=collect:10m rate=100r/s;

    server {
        listen 80;
        server_name _;

        # 静态文件（前端）
        location / {
            proxy_pass http://monitor_web;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_buffering off;
        }

        # API
        location /api/ {
            proxy_pass http://monitor_api;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 30s;
            proxy_buffering off;
        }

        # SSE 长连接（实时推送）
        location /api/dashboard/realtime {
            proxy_pass http://monitor_api;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header Connection '';
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 3600s;
        }

        location /api/tracking/live-events {
            proxy_pass http://monitor_api;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header Connection '';
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 3600s;
        }

        # SDK 上报（高并发，单独限流）
        location /api/v1/collect {
            proxy_pass http://monitor_api;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            limit_req zone=collect burst=200 nodelay;
        }

        # 健康检查
        location /health {
            proxy_pass http://monitor_api;
        }
    }

    # HTTPS（预留，需配置 SSL 证书后启用）
    # server {
    #     listen 443 ssl http2;
    #     server_name monitor.example.com;
    #
    #     ssl_certificate /etc/nginx/ssl/cert.pem;
    #     ssl_certificate_key /etc/nginx/ssl/key.pem;
    #
    #     include /etc/nginx/conf.d/locations.conf;
    # }
}
